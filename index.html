<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIVIS Demo - Clarendon</title>
<style>
  :root{
    --ink:#141413; --grey-1:#6b6a66; --grey-2:#8a8985; --line:#e7e5df;
    --bg:#faf9f5; --panel:#ffffff; --teal:#11A7B4; --teal-tint:#e6f3f1;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-variant-numeric:tabular-nums;}
  body{
    display:flex; font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink); background:var(--bg);
  }
  #sidebar{
    width:260px; min-width:260px; height:100vh; overflow-y:auto;
    background:var(--panel); border-right:1px solid var(--line);
    padding:16px 0 32px;
  }
  #sidebar .brandmark{
    display:flex; align-items:center; gap:9px; margin:0 16px 2px;
  }
  #sidebar .brandmark .logo{
    width:26px; height:26px; border-radius:6px; background:var(--teal);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex:0 0 auto;
  }
  #sidebar .brandmark .logo svg{ width:16px; height:16px; display:block; }
  #sidebar h1{
    font-size:14px; font-weight:700; letter-spacing:.02em;
    margin:0; color:var(--ink); line-height:1.2;
  }
  #sidebar h1 .prod{
    display:block; font-size:10px; font-weight:600; letter-spacing:.06em;
    text-transform:uppercase; color:var(--grey-2); margin-top:1px;
  }
  #sidebar .sub{
    font-size:11px; color:var(--grey-2); margin:12px 16px 16px;
  }
  .group-label{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--grey-2); margin:18px 16px 6px; display:flex; align-items:center; gap:6px;
  }
  .group-label .beta-tag{
    font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    color:var(--teal); background:var(--teal-tint); border-radius:999px; padding:1px 6px;
  }
  nav a{
    display:flex; align-items:center; gap:10px; padding:7px 16px; color:var(--ink);
    text-decoration:none; font-size:13px; border-left:2px solid transparent;
  }
  nav a svg{
    width:16px; height:16px; flex:0 0 auto; stroke:var(--grey-1); stroke-width:1.7;
    fill:none; stroke-linecap:round; stroke-linejoin:round;
  }
  nav a:hover{ background:var(--teal-tint); }
  nav a.active{
    background:var(--teal-tint); border-left-color:var(--teal); font-weight:600; color:var(--teal);
  }
  nav a.active svg{ stroke:var(--teal); }
  #main{ flex:1; height:100vh; display:flex; flex-direction:column; }
  #topbar{
    height:40px; min-height:40px; display:flex; align-items:center; gap:8px;
    padding:0 14px; border-bottom:1px solid var(--line); background:var(--panel);
    font-size:12px; color:var(--grey-1);
  }
  #topbar #pageTitle{ font-weight:600; color:var(--ink); }
  #topbar .note{ margin-left:auto; color:var(--grey-2); font-size:11px; }
  iframe{ flex:1; width:100%; border:0; background:#fff; }
</style>
</head>
<body>
  <div id="sidebar">
    <div class="brandmark">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 18L10 6l3 6 2-3 5 9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h1>AIVIS<span class="prod">Clarendon demo</span></h1>
    </div>
    <div class="sub">Clarendon Homes - illustrative demo data</div>
    <nav id="navlist"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <span id="pageTitle">Overview</span>
      <span class="note">Demo workspace · illustrative data</span>
    </div>
    <iframe id="frame" title="Page preview"></iframe>
  </div>

<script>
  // Nav IA per owner's 2026-07-15 grouping decision: 5 groups -
  // Visibility / Quality / Insights / Data / Agency & Admin.
  // Compare sits under Insights (not Visibility) per that decision.
  // Icon set matches the report-page sidebars (single-path, stroke style).
  // Kept in sync with build_merged_demo.py ICONS.
  var ICONS = {
    overview: "M3 12h4l3 8 4-16 3 8h4",
    visibility: "M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7zM12 15a3 3 0 100-6 3 3 0 000 6z",
    competitors: "M4 20V10M10 20V4M16 20v-8M22 20H2",
    compare: "M7 7h11l-3-3M17 17H6l3 3",
    recommendations: "M9 18h6M10 21h4M12 3a6 6 0 00-4 10c1 1 1 2 1 3h6c0-1 0-2 1-3a6 6 0 00-4-10z",
    action: "M9 6h11M9 12h11M9 18h11M4 5.5l1.2 1.2L7.5 4.5M4 11.5l1.2 1.2 2.3-2.2M4 17.5l1.2 1.2 2.3-2.2",
    campaigns: "M3 11v2l14 5V6L3 11zM17 8a4 4 0 010 8",
    citations: "M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1",
    fanout: "M4 6h6M4 12h10M4 18h14",
    prompts: "M4 5h16v11H8l-4 4z",
    answers: "M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2zM8 10l2.5 2.5L16 8",
    traffic: "M22 12h-4l-3 9L9 3l-3 9H2",
    status: "M5 12.5a7 7 0 0114 0M8.5 15.5a3.5 3.5 0 017 0M12 19h.01",
    offsite: "M12 3a9 9 0 100 18 9 9 0 000-18zM3 12h18M12 3a15 15 0 010 18a15 15 0 010-18z",
    sentiment: "M12 3a9 9 0 100 18 9 9 0 000-18zM8.5 14s1.3 2 3.5 2 3.5-2 3.5-2M9 9.5h.01M15 9.5h.01",
    accuracy: "M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6zM9 12l2 2 4-4",
    score: "M12 21a9 9 0 119-9M12 12l5-4M12 12v-3",
    audit: "M14 3H6v18h12V8zM14 3l4 5M10 13a2 2 0 104 0 2 2 0 00-4 0M13.5 15.5L16 18",
    reports: "M14 3H6v18h12V8zM14 3l4 5M9 13h6M9 17h4",
    research: "M11 4h2M10 4v5l-4.5 8a2 2 0 001.8 3h9.4a2 2 0 001.8-3L15 9V4",
    experiments: "M4 5h16v14H4zM7 9l3 3-3 3M13 15h4",
    layers: "M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5",
    onboarding: "M15 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M8.5 11a4 4 0 100-8 4 4 0 000 8M19 8v6M22 11h-6",
    settings: "M12 9a3 3 0 100 6 3 3 0 000-6zM12 2v3M12 19v3M4 12H1M23 12h-3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1",
    clients: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8M22 21v-2a4 4 0 00-3-3.9M16 3.2a4 4 0 010 7.6",
    portfolio: "M3 8h18v12H3zM8 8V5a2 2 0 012-2h4a2 2 0 012 2v3",
    orgadmin: "M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z",
    organalytics: "M12 3v9l7 4M21 12a9 9 0 11-9-9",
    presale: "M12 3a9 9 0 100 18 9 9 0 000-18zM12 7v5l3 2"
  };

  var PAGES = [
    { group: "Visibility", items: [
      { label: "Overview", file: "l4-overview-artifact.html", icon: "overview" },
      { label: "Visibility", file: "v4-visibility-v6.html", icon: "visibility" },
      { label: "Competitors", file: "n4-competitors-artifact.html", icon: "competitors" }
    ]},
    { group: "Quality", items: [
      { label: "Sentiment", file: "m5-sentiment-v6.html", icon: "sentiment" },
      { label: "Accuracy", file: "accuracy-audit-v7a.html", icon: "accuracy" },
      { label: "Citations", file: "citations-v7b-artifact.html", icon: "citations" },
      { label: "Query Fan-Out", file: "query-fanout-v7a.html", icon: "fanout" },
      { label: "Answers", file: "answers-v6.html", icon: "answers" },
      { label: "Offsite Mentions", file: "offsite-mentions-v6.html", icon: "offsite" }
    ]},
    { group: "Insights", items: [
      { label: "Recommendations", file: "recommendations-v7b-artifact.html", icon: "recommendations" },
      { label: "Compare", file: "compare-a-v6.html", icon: "compare" },
      { label: "Content Score", file: "content-score-a-v6.html", icon: "score" },
      { label: "Content Audit", file: "content-audit-a-artifact.html", icon: "audit" }
    ]},
    { group: "Data", items: [
      { label: "Prompts", file: "pr4-prompts-artifact.html", icon: "prompts" },
      { label: "Research", file: "research-artifact.html", icon: "research" },
      { label: "Reports", file: "reports-a-artifact.html", icon: "reports" },
      { label: "Agent Status", file: "agent-status-v5.html", icon: "status" },
      { label: "Agent Traffic", file: "agent-traffic-v5.html", icon: "traffic" }
    ]},
    { group: "Agency & Admin", items: [
      { label: "Agency Portfolio", file: "agency-portfolio-artifact.html", icon: "portfolio" },
      { label: "Client Management", file: "client-management-artifact.html", icon: "clients" },
      { label: "Org Admin & Governance", file: "org-admin-governance-a-artifact.html", icon: "orgadmin" },
      { label: "Org Analytics & Alerts", file: "org-analytics-alerts-a.html", icon: "organalytics" },
      { label: "Settings", file: "settings-a-artifact.html", icon: "settings" },
      { label: "Onboarding", file: "onboarding-artifact.html", icon: "onboarding" }
    ]},
    { group: "Beta", beta: true, items: [
      { label: "Action Plan", file: "action-plan-artifact.html", icon: "action" },
      { label: "Experiments & Ask", file: "experiments-runs-ask-a-artifact.html", icon: "experiments" },
      { label: "One-Pager Export", file: "layercompare-onepager-a-artifact.html", icon: "layers" },
      { label: "Campaigns", file: "campaigns-artifact.html", icon: "campaigns" },
      { label: "Prospect Audit", file: "presale-artifact.html", icon: "presale" }
    ]}
  ];

  var navlist = document.getElementById('navlist');
  var frame = document.getElementById('frame');
  var pageTitle = document.getElementById('pageTitle');
  var slugToItem = {};

  function slugify(label){
    return label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  PAGES.forEach(function(group){
    var label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group.group;
    if (group.beta) {
      var tag = document.createElement('span');
      tag.className = 'beta-tag';
      tag.textContent = 'beta';
      label.appendChild(tag);
    }
    navlist.appendChild(label);
    group.items.forEach(function(item){
      var slug = slugify(item.label);
      slugToItem[slug] = item;
      var a = document.createElement('a');
      a.href = '#' + slug;
      a.dataset.slug = slug;
      var path = ICONS[item.icon] || '';
      var svg = '<svg viewBox="0 0 24 24"><path d="' + path + '"/></svg>';
      a.innerHTML = svg + '<span>' + item.label + '</span>';
      navlist.appendChild(a);
    });
  });

  function activate(slug){
    var item = slugToItem[slug];
    if (!item) { slug = 'overview'; item = slugToItem[slug]; }
    frame.src = item.file;
    pageTitle.textContent = item.label;
    var links = navlist.querySelectorAll('a');
    for (var i = 0; i < links.length; i++){
      links[i].classList.toggle('active', links[i].dataset.slug === slug);
    }
  }

  window.addEventListener('hashchange', function(){
    activate(location.hash.replace('#', ''));
  });

  activate(location.hash ? location.hash.replace('#', '') : 'overview');
</script>
</body>
</html>
